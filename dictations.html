<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<meta name="robots" content="noindex">
<title>Steno Practice Tool - Progressive Passages</title>

<!-- External Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
<script src="digiwallet.js"></script>

<!-- Google Fonts & Icons -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
    /* --- 1. Global Styles --- */
    :root {
      --primary-blue: #007bff; --primary-blue-dark: #0056b3;
      --text-color: #111827; --dark-grey: #333; --medium-grey: #555;
      --bg-color: #f8fafc; --surface-color: #ffffff;
      --border-color: #e2e8f0; --white: #fff;
      --font-family: 'Inter', sans-serif;
      --accent-purple: #7c3aed;
      --accent-purple-light: #f3e8ff;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      font-family: var(--font-family); background-color: var(--bg-color); color: var(--text-color);
      margin: 0; padding: 0; width: 100%; min-height: 100vh; line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .app-container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
    button { font-family: var(--font-family); cursor: pointer; border: none; }
    .view { display: none; animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* --- SELECTION VIEW --- */
    .page-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 32px; }
    .page-header h1 { font-size: 2rem; font-weight: 800; color: #0f172a; margin: 0; letter-spacing: -0.025em; }
    
    .search-wrapper { position: relative; }
    .search-wrapper input { width: 300px; padding: 12px 16px 12px 44px; border: 1px solid var(--border-color); border-radius: 12px; font-size: 0.95em; background-color: white; box-shadow: var(--shadow-sm); }
    .search-wrapper svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; color: #9ca3af; }

    .intro-box { background: white; border: 1px solid var(--border-color); border-radius: 20px; padding: 24px; margin-bottom: 32px; box-shadow: var(--shadow-sm); }
    .intro-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .intro-header h2 { font-size: 1.25rem; font-weight: 700; margin: 0; }
    .intro-header .tag { background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: white; padding: 4px 12px; border-radius: 99px; font-size: 0.75em; font-weight: 700; }
    .intro-actions { display: flex; gap: 10px; margin-top: 15px; }
    .intro-actions button { padding: 10px 20px; border-radius: 10px; font-weight: 600; font-size: 0.9em; transition: all 0.2s; }
    #resetProgressBtn { background: white; border: 1px solid var(--border-color); color: #64748b; }

    #passage-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
    .passage-card { background: white; border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; transition: all 0.3s ease; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; }
    .passage-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
    .card-title-group h3 { font-size: 1.1rem; font-weight: 700; color: #1e293b; margin: 8px 0; }
    .card-id-badge { font-size: 0.75em; color: #94a3b8; font-weight: 600; text-transform: uppercase; }
    .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 6px; font-size: 0.8em; font-weight: 600; background-color: #f1f5f9; color: #64748b; width: 100%; }
    .status-badge.attempted { background-color: #ecfdf5; color: #059669; }
    .take-test-btn { width: 100%; padding: 10px; background-color: white; border: 1px solid var(--border-color); font-weight: 600; border-radius: 8px; margin-top: 15px; cursor: pointer; }
    .passage-card:hover .take-test-btn { background-color: #1e293b; color: white; }

    /* --- PLAYER VIEW --- */
    #player-view { max-width: 680px; margin: 20px auto; }
    .practice-station { background: #ffffff; border-radius: 20px; box-shadow: 0 20px 40px -5px rgba(0, 0, 0, 0.08); border: 1px solid rgba(0,0,0,0.04); padding: 0; overflow: hidden; }
    .player-header { padding: 15px 25px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
    .player-body { padding: 30px 25px; text-align: center; }
    .progress-bar-wrapper { width: 100%; height: 6px; background-color: #f1f5f9; border-radius: 99px; cursor: pointer; overflow: hidden; }
    #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #8b5cf6, #6366f1); }
    .controls-cluster { display: flex; align-items: center; justify-content: center; gap: 16px; margin: 20px 0; }
    .play-btn-large { width: 64px; height: 64px; background: #1e293b; color: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; }
    .control-btn { width: 44px; height: 44px; border-radius: 12px; background: white; border: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: center; }
    .test-config-area { background-color: #f8fafc; border-top: 1px solid #e2e8f0; padding: 20px 25px; }
    .modern-select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #cbd5e1; margin-top: 5px; }

    /* --- EXAM VIEW --- */
    #exam-view { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; flex-direction: column; font-family: Tahoma, sans-serif; z-index: 2000; }
    .ssc-header { background: #f0f0f0; padding: 10px 20px; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between; }
    .ssc-main-content { display: flex; flex-grow: 1; }
    .ssc-typing-area { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; }
    #typingBox { flex-grow: 1; border: 1px solid #000; padding: 15px; font-size: 18px; font-family: 'Courier New', monospace; resize: none; }
    .ssc-candidate-panel { width: 300px; background: #f0f0f0; border-left: 1px solid #ccc; padding: 20px; }

    /* --- LOADER --- */
    .full-page-loader { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); display:none; justify-content:center; align-items:center; z-index:9999; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #7c3aed; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Use result styles from original source... */
    .result-sheet-container { background: white; padding: 30px; border-radius: 15px; border: 1px solid #e2e8f0; }
    .stat-pill { background: #0891b2; color: white; padding: 8px 15px; border-radius: 8px; font-weight: 600; display: inline-block; margin: 5px; }
    .highlight { padding: 2px 4px; border-radius: 4px; }
    .omission { background: #d9f99d; }
    .addition { background: #fecdd3; }
    .spelling { background: #fde68a; }
</style>
</head>
<body>

<div id="fullPageLoader" class="full-page-loader">
    <div class="spinner"></div>
</div>

<div class="app-container">
    <!-- SELECTION VIEW -->
    <div id="selection-view" class="view">
        <div class="page-header">
            <h1>Progressive Magazine Dictations</h1>
            <div class="search-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z"/></svg>
                <input type="search" id="passageSearch" placeholder="Search by title or month...">
            </div>
        </div>
        
        <div id="quick-resume-container"></div>

        <div class="intro-box">
            <div class="intro-header">
                <h2>Practice Station</h2>
                <span class="tag">PROGRESSIVE</span>
            </div>
            <p>Practice latest monthly progressive dictations. Your progress and accuracy history is saved automatically.</p>
            <div class="intro-actions">
                <button id="resetProgressBtn" onclick="confirmReset()">Reset Progress</button>
            </div>
        </div>

        <div id="passage-grid">
            <!-- Dynamically Populated -->
        </div>
    </div>
    
    <!-- PLAYER VIEW -->
    <div id="player-view" class="view">
        <div id="player"></div> 
        <div class="practice-station">
            <div class="player-header">
                <div>
                    <h2 id="p-title" style="margin:0; font-size:1.1rem;">Loading...</h2>
                    <p id="p-subtitle" style="margin:0; font-size:0.85rem; color:#64748b;"></p>
                </div>
                <button onclick="openTranscriptModal()" style="font-size:0.8rem; background:#f1f5f9; padding:5px 10px; border-radius:5px;">View Transcript</button>
            </div>
            <div class="player-body">
                <div class="progress-bar-wrapper" id="progressBar">
                    <div id="progress-fill"></div>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-top:5px; color:#94a3b8;">
                    <span id="current-time">00:00</span>
                    <span id="total-time">00:00</span>
                </div>
                <div class="controls-cluster">
                    <button class="control-btn" onclick="seekRelative(-5)">-5s</button>
                    <button id="playBtn" class="play-btn-large" onclick="togglePlay()">Play</button>
                    <button id="pauseBtn" class="play-btn-large" onclick="togglePlay()" style="display:none;">Pause</button>
                    <button class="control-btn" onclick="seekRelative(5)">+5s</button>
                </div>
                <div style="margin-top:10px;">
                    <span id="wpmSpeedDisplay" style="font-weight:700;">100 WPM</span><br>
                    <input type="range" id="wpmRange" min="60" max="160" step="5" value="100" oninput="updateSpeedDisplay(this.value)" onchange="setPlaybackSpeed()" style="width:200px;">
                </div>
            </div>
            <div class="test-config-area">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;">
                    <div>
                        <label style="font-size:0.75rem; font-weight:700; color:#64748b;">Target Words</label>
                        <select id="wordCountSelect" class="modern-select"></select>
                    </div>
                    <div>
                        <label style="font-size:0.75rem; font-weight:700; color:#64748b;">Timer</label>
                        <select id="timer-select" class="modern-select">
                            <option value="50" selected>50 Minutes</option>
                            <option value="40">40 Minutes</option>
                            <option value="10">10 Minutes</option>
                        </select>
                    </div>
                </div>
                <button id="startTranscriptionBtn" onclick="startTranscriptionTest()" style="width:100%; background:#1e293b; color:white; padding:15px; border-radius:10px; font-weight:700;">🚀 Start Transcription Test</button>
            </div>
        </div>
        <button onclick="showView('selection-view')" style="width:100%; margin-top:20px; background:none; color:#94a3b8;">Go Back</button>
    </div>

    <!-- RESULTS VIEW -->
    <div id="results-view" class="view">
        <div id="resultSheetContainer"></div>
        <div style="text-align:center; margin-top:30px;">
            <button onclick="window.print()" style="padding:10px 20px; background:#1e293b; color:white; border-radius:8px;">Download Report</button>
            <button onclick="showView('selection-view')" style="padding:10px 20px; background:#0891b2; color:white; border-radius:8px; margin-left:10px;">Try Another</button>
        </div>
    </div>
</div>

<!-- EXAM OVERLAY -->
<div id="exam-view">
    <header class="ssc-header">
        <div style="font-weight:800;">STAFF SELECTION COMMISSION</div>
        <div id="typingTimerDisplay" style="color:red; font-weight:bold; font-size:1.2rem;">50:00</div>
    </header>
    <main class="ssc-main-content">
        <div class="ssc-typing-area">
            <textarea id="typingBox" placeholder="Start typing here..."></textarea>
            <button onclick="submitTranscription()" style="margin-top:10px; background:red; color:white; padding:10px; width:100px;">Submit</button>
        </div>
        <aside class="ssc-candidate-panel">
            <div style="width:100px; height:120px; background:#ddd; margin: 0 auto 15px auto;"></div>
            <div id="candidate-name-display" style="font-weight:bold; text-align:center;">CANDIDATE</div>
            <hr>
            <p>Roll: 9876543210</p>
            <p>Lang: English</p>
        </aside>
    </main>
</div>

<!-- TRANSCRIPT MODAL -->
<div id="transcriptModal" class="full-page-loader" style="background:rgba(0,0,0,0.5)">
    <div style="background:white; padding:30px; border-radius:15px; max-width:600px; max-height:80vh; overflow-y:auto;">
        <h3>Passage Transcript</h3>
        <p id="transcriptTextBody" style="line-height:1.8; color:#444;"></p>
        <button onclick="document.getElementById('transcriptModal').style.display='none'" style="background:#1e293b; color:white; padding:10px 20px; border-radius:8px;">Close</button>
    </div>
</div>

<script>
// --- DB CONFIG ---
const localDb = new Dexie("CheckMySteno_Progressive");
localDb.version(1).stores({ attempts: '++id, timestamp, dictationName, accuracy', overallStats: 'id' });

const firebaseConfig = {
  apiKey: "AIzaSyDPkUWIrsibI-hzKJ8ljhvawdJ9Nq4-cpE",
  authDomain: "checkmysteno.firebaseapp.com",
  projectId: "checkmysteno",
  storageBucket: "checkmysteno.firebasestorage.app",
  messagingSenderId: "719325115943",
  appId: "1:719325115943:web:0dd50a67978816d42a8002"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// --- STATE ---
let player, originalText = "", wordCount = 0, g_passageId = "", candidateId;
let transcriptionTimerTotalTime = 0, timeLeft = 0, timer = null;
let allPassageData = [];
let currentPlaybackRate = 1;
let analysisWorker = new Worker('worker.js');

// --- INIT ---
document.addEventListener("DOMContentLoaded", async () => {
    const user = DigiWallet.getUser();
    if (!user || !DigiWallet.isPremium()) {
        alert("Premium Access Required");
        return;
    }
    candidateId = user.uid;
    document.getElementById('candidate-name-display').textContent = user.name || "CANDIDATE";
    
    showLoader(true);
    await fetchPassageIndex();
    showLoader(false);
    
    renderGrid();
    setupProgressBar();
});

// --- CORE FETCHING LOGIC (THE UPDATE) ---
async function fetchPassageIndex() {
    allPassageData = [];
    try {
        const snap = await db.collection("monthlyProgressive_index").get();
        snap.forEach(doc => {
            const data = doc.data();
            Object.keys(data).forEach(key => {
                if (typeof data[key] === 'object') {
                    allPassageData.push({
                        id: key, // e.g. 2025_03_01
                        title: data[key].title,
                        meta: data[key].meta,
                        passageNumber: data[key].passageNumber,
                        status: data[key].status
                    });
                }
            });
        });
        // Sort descending
        allPassageData.sort((a, b) => b.id.localeCompare(a.id));
    } catch (e) { console.error("Index fetch error", e); }
}

async function loadPractice(passageId) {
    g_passageId = passageId;
    showLoader(true);
    try {
        const doc = await db.collection("monthlyProgressive_passages").doc(passageId).get();
        if (!doc.exists) throw new Error("Passage not found");
        
        const data = doc.data();
        originalText = data.originalText;
        wordCount = originalText.trim().split(/\s+/).length;
        
        const info = allPassageData.find(p => p.id === passageId);
        document.getElementById('p-title').innerText = info.title;
        document.getElementById('p-subtitle').innerText = info.meta;
        
        setupWordCountOptions();
        loadVideo(data.audioUrl);
        showView('player-view');
    } catch (e) { alert(e.message); }
    showLoader(false);
}

function renderGrid() {
    const grid = document.getElementById('passage-grid');
    const searchTerm = document.getElementById('passageSearch').value.toLowerCase();
    const progress = JSON.parse(localStorage.getItem(`prog_scores_${candidateId}`) || '{}');
    
    grid.innerHTML = '';
    allPassageData.filter(p => p.title.toLowerCase().includes(searchTerm) || p.meta.toLowerCase().includes(searchTerm))
    .forEach(p => {
        const score = progress[p.id];
        const card = document.createElement('div');
        card.className = 'passage-card';
        card.innerHTML = `
            <div>
                <span class="card-id-badge">${p.meta}</span>
                <span class="status-badge ${score ? 'attempted' : ''}">${score ? score+'%' : 'New'}</span>
                <h3>${p.title}</h3>
            </div>
            <button class="take-test-btn" onclick="loadPractice('${p.id}')">Start Practice</button>
        `;
        grid.appendChild(card);
    });
}

// --- PLAYER LOGIC ---
function loadVideo(url) {
    const vidId = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
    if (player) {
        player.loadVideoById(vidId);
    } else {
        player = new YT.Player('player', {
            height: '0', width: '0', videoId: vidId,
            events: { 'onStateChange': onPlayerStateChange, 'onReady': (e) => { e.target.setVolume(100); updateVideoTimeDisplay(); } }
        });
    }
}

function onPlayerStateChange(e) {
    if (e.data == YT.PlayerState.PLAYING) {
        document.getElementById('playBtn').style.display = 'none';
        document.getElementById('pauseBtn').style.display = 'flex';
        setInterval(updateVideoTimeDisplay, 500);
    } else {
        document.getElementById('playBtn').style.display = 'flex';
        document.getElementById('pauseBtn').style.display = 'none';
    }
}

function togglePlay() {
    const state = player.getPlayerState();
    state === 1 ? player.pauseVideo() : player.playVideo();
}

function seekRelative(sec) { player.seekTo(player.getCurrentTime() + sec, true); }

function updateVideoTimeDisplay() {
    const cur = player.getCurrentTime();
    const dur = player.getDuration();
    document.getElementById('progress-fill').style.width = (cur/dur * 100) + '%';
    document.getElementById('current-time').innerText = formatTime(cur);
    document.getElementById('total-time').innerText = formatTime(dur);
}

function formatTime(s) { 
    const m = Math.floor(s/60); 
    const sec = Math.floor(s%60); 
    return `${m}:${sec.toString().padStart(2,'0')}`; 
}

function setPlaybackSpeed() {
    const val = document.getElementById('wpmRange').value;
    // Simple speed calc: original was ~100wpm, so 1.1x = 110wpm
    currentPlaybackRate = val / 100;
    player.setPlaybackRate(currentPlaybackRate);
}

function updateSpeedDisplay(v) { document.getElementById('wpmSpeedDisplay').innerText = v + " WPM"; }

// --- TEST LOGIC ---
function startTranscriptionTest() {
    if (player) player.pauseVideo();
    document.getElementById('exam-view').style.display = 'flex';
    document.getElementById('typingBox').value = '';
    transcriptionTimerTotalTime = parseInt(document.getElementById('timer-select').value) * 60;
    timeLeft = transcriptionTimerTotalTime;
    startTimer();
}

function startTimer() {
    timer = setInterval(() => {
        timeLeft--;
        document.getElementById('typingTimerDisplay').innerText = formatTime(timeLeft);
        if (timeLeft <= 0) submitTranscription();
    }, 1000);
}

function submitTranscription() {
    clearInterval(timer);
    showLoader(true);
    const typed = document.getElementById('typingBox').value;
    
    analysisWorker.postMessage({
        originalText: originalText,
        userText: typed,
        config: { mode:'exam', addition:1, omission:1, spelling:0.5, capitalization:0.5, punctuation:{mode:'all', weight:0.5} }
    });

    analysisWorker.onmessage = (e) => {
        const res = e.data;
        showView('results-view');
        document.getElementById('exam-view').style.display = 'none';
        renderResults(res, typed);
        saveScore(res.accuracy);
        showLoader(false);
    };
}

function renderResults(res, typed) {
    const container = document.getElementById('resultSheetContainer');
    container.innerHTML = `
        <div class="result-sheet-container">
            <h2>Result for ${g_passageId}</h2>
            <div class="stat-pill">Accuracy: ${res.accuracy.toFixed(2)}%</div>
            <div class="stat-pill">Typed: ${typed.split(/\s+/).length} words</div>
            <div class="stat-pill" style="background:red">Full Mistakes: ${res.mistakeCounters.addition + res.mistakeCounters.omission}</div>
            <hr>
            <div style="line-height:2; font-size:1.1rem;">${res.resultHTML}</div>
        </div>
    `;
}

function saveScore(acc) {
    const scores = JSON.parse(localStorage.getItem(`prog_scores_${candidateId}`) || '{}');
    if (!scores[g_passageId] || acc > scores[g_passageId]) {
        scores[g_passageId] = acc.toFixed(2);
        localStorage.setItem(`prog_scores_${candidateId}`, JSON.stringify(scores));
    }
}

// --- UTILS ---
function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}

function showLoader(show) { document.getElementById('fullPageLoader').style.display = show ? 'flex' : 'none'; }

function openTranscriptModal() {
    document.getElementById('transcriptTextBody').innerText = originalText;
    document.getElementById('transcriptModal').style.display = 'flex';
}

function setupWordCountOptions() {
    const sel = document.getElementById('wordCountSelect');
    sel.innerHTML = `<option value="full">Full (${wordCount} words)</option>`;
}

function setupProgressBar() {
    document.getElementById('progressBar').addEventListener('click', (e) => {
        const rect = e.target.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        player.seekTo(pos * player.getDuration(), true);
    });
}

function confirmReset() {
    if (confirm("Clear all your progressive practice history?")) {
        localStorage.removeItem(`prog_scores_${candidateId}`);
        location.reload();
    }
}
</script>
</body>
</html>
