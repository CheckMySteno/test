<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<meta name="robots" content="noindex">
<title>Steno Practice Tool - Progressive Magazine</title>

<!-- External Scripts (Matching versions in your index.html) -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>

<!-- DigiWallet Script -->
<script src="digiwallet.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
    /* --- CSS REPLICATED SYSTEMATICALLY FROM KC TOOL --- */
    :root {
      --primary-blue: #007bff; --primary-blue-dark: #0056b3;
      --text-color: #111827; --dark-grey: #333; --medium-grey: #555;
      --bg-color: #f8fafc; --surface-color: #ffffff;
      --border-color: #e2e8f0; --white: #fff;
      --font-family: 'Inter', sans-serif;
      --accent-purple: #7c3aed;
      --accent-purple-light: #f3e8ff;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --hl-additions: #fecdd3; --hl-omissions: #d9f99d; --hl-spelling: #fde68a; --hl-capitalization: #bae6fd; --hl-punctuation: #ddd6fe;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; width: 100%; min-height: 100vh; line-height: 1.5; -webkit-font-smoothing: antialiased; }
    .app-container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
    button { font-family: var(--font-family); cursor: pointer; border: none; }
    .view { display: none; animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* SELECTION VIEW */
    .page-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 32px; }
    .page-header h1 { font-size: 2rem; font-weight: 800; color: #0f172a; margin: 0; letter-spacing: -0.025em; }
    .search-wrapper { position: relative; }
    .search-wrapper input { width: 300px; padding: 12px 16px 12px 44px; border: 1px solid var(--border-color); border-radius: 12px; font-size: 0.95em; background: white; box-shadow: var(--shadow-sm); }
    .search-wrapper svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; color: #9ca3af; }

    .intro-box { background: white; border: 1px solid var(--border-color); border-radius: 20px; padding: 24px; margin-bottom: 32px; box-shadow: var(--shadow-sm); }
    .filter-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .filter-bar select { padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border-color); background: white; font-weight: 500; cursor: pointer; }

    #passage-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
    .passage-card { background: white; border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; transition: all 0.3s; position: relative; display:flex; flex-direction:column; justify-content:space-between; }
    .passage-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--accent-purple); }
    .card-id-badge { font-size: 0.75em; color: var(--accent-purple); font-weight: 800; text-transform: uppercase; }
    .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 6px; font-size: 0.8em; font-weight: 600; background-color: #f1f5f9; color: #64748b; width: 100%; margin-top:8px;}
    .status-badge.attempted { background-color: #ecfdf5; color: #059669; }
    .take-test-btn { width: 100%; padding: 10px; background: white; border: 1px solid var(--border-color); font-weight: 600; border-radius: 8px; margin-top: 15px; cursor:pointer; }
    .passage-card:hover .take-test-btn { background: #1e293b; color: white; }

    /* PLAYER & TRANSCRIPTION */
    #player-view { max-width: 680px; margin: 20px auto; }
    .practice-station { background: #ffffff; border-radius: 20px; box-shadow: 0 20px 40px -5px rgba(0, 0, 0, 0.08); border: 1px solid rgba(0,0,0,0.04); overflow: visible; position: relative; }
    .player-header { background: #fff; padding: 15px 25px; border-bottom: 1px solid #f1f5f9; border-radius: 20px 20px 0 0; display: flex; justify-content: space-between; align-items: center; }
    .player-body { padding: 30px 25px; text-align: center; }
    .progress-bar-wrapper { width: 100%; height: 6px; background-color: #f1f5f9; border-radius: 99px; cursor: pointer; position: relative; overflow: hidden; margin: 20px 0;}
    #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #8b5cf6, #6366f1); border-radius: 99px; }
    .controls-cluster { display: flex; align-items: center; justify-content: center; gap: 16px; }
    .play-btn-large { width: 64px; height: 64px; background: #1e293b; color: white; border-radius: 20px; display:flex; align-items:center; justify-content:center; font-size:24px; cursor:pointer;}
    .test-config-area { background-color: #f8fafc; border-top: 1px solid #e2e8f0; padding: 20px 25px; border-radius: 0 0 20px 20px; }
    .modern-select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; margin-top: 8px; }

    /* RESULTS VIEW */
    .result-sheet-container { background: white; padding: 35px 45px; border-radius: 16px; border: 1px solid var(--border-color); max-width: 1200px; margin: auto; }
    .stat-pill { background: #0891b2; color: white; padding: 10px 20px; border-radius: 10px; font-weight: 600; display: inline-flex; align-items: center; margin: 5px; }
    .col { background: #f8fafc; border: 1px solid var(--border-color); padding: 25px; border-radius: 12px; line-height: 1.7; font-size: 1.1em; }
    
    .highlight { padding: 2px 4px; border-radius: 4px; position: relative; cursor: pointer; }
    .omission { background: var(--hl-omissions); }
    .addition { background: var(--hl-additions); }
    .spelling { background: var(--hl-spelling); }

    .full-page-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; justify-content: center; align-items: center; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #7c3aed; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* EXAM INTERFACE */
    #exam-view { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; flex-direction: column; z-index: 2000; font-family: Tahoma; }
    .ssc-header { background: #f0f0f0; border-bottom: 1px solid #ccc; padding: 10px 20px; display: flex; justify-content: space-between; }
    #typingBox { width: 100%; height: 85%; border: 1px solid #000; padding: 15px; font-family: 'Courier New'; font-size: 18px; resize: none; outline: none; }
</style>
</head>
<body oncontextmenu="return false;">

<div id="fullPageLoader" class="full-page-loader"><div class="spinner"></div></div>

<div class="app-container">
    <!-- SELECTION VIEW -->
    <div id="selection-view" class="view">
        <div class="page-header">
            <h1>Progressive Magazine</h1>
            <div class="search-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="position:absolute; left:14px; top:12px; color:#9ca3af;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                <input type="search" id="passageSearch" placeholder="Search title or month...">
            </div>
        </div>

        <div class="intro-box">
            <h2 style="margin:0;">Monthly Progressive Practice</h2>
            <p>Synced with your Premium Pass. Access all magazine dictations systematically.</p>
            <button id="resetProgressBtn" style="color:#ef4444; background:none; border:1px solid #ef4444; padding:8px 15px; border-radius:8px;">Reset Progressive Data</button>
        </div>

        <div class="filter-bar">
            <select id="yearFilter">
                <option value="">All Years</option>
                <script>for(let y=new Date().getFullYear(); y>=2020; y--) document.write(`<option value="${y}">${y}</option>`);</script>
            </select>
            <select id="monthFilter">
                <option value="">All Months</option>
                <option value="01">January</option><option value="02">February</option><option value="03">March</option>
                <option value="04">April</option><option value="05">May</option><option value="06">June</option>
                <option value="07">July</option><option value="08">August</option><option value="09">September</option>
                <option value="10">October</option><option value="11">November</option><option value="12">December</option>
            </select>
        </div>

        <div id="passage-grid">
            <!-- Populated by Firebase following your progressive_index rules -->
        </div>
    </div>

    <!-- PLAYER VIEW -->
    <div id="player-view" class="view">
        <div id="player"></div>
        <div class="practice-station">
            <div id="player-loader" class="full-page-loader" style="position:absolute; border-radius:20px; background:rgba(255,255,255,0.9);"><div class="spinner"></div></div>
            <div class="player-header">
                <div>
                    <h2 style="margin:0;">Practice Station</h2>
                    <p id="player-subtitle" style="margin:5px 0 0 0; color:#64748b;">Loading...</p>
                </div>
                <button onclick="openTranscriptModal()" style="background:#f1f5f9; padding:8px 15px; border-radius:8px; font-weight:bold;">Transcript</button>
            </div>
            <div class="player-body">
                <div class="progress-bar-wrapper" id="progressBar"><div id="progress-fill"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:12px; color:#94a3b8; margin-bottom:20px;">
                    <span id="current-time">00:00</span><span id="total-time">00:00</span>
                </div>
                <div class="controls-cluster">
                    <button class="control-btn" onclick="seekRelative(-5)">-5s</button>
                    <button id="playBtn" class="play-btn-large" onclick="togglePlay()">▶</button>
                    <button id="pauseBtn" class="play-btn-large" onclick="togglePlay()" style="display:none;">⏸</button>
                    <button class="control-btn" onclick="seekRelative(5)">+5s</button>
                    <select id="wpmRange" onchange="setPlaybackSpeed()" style="padding:10px; border-radius:10px; border:1px solid #ddd;">
                        <script>for(let i=60; i<=160; i+=5) document.write(`<option value="${i}" ${i==100?'selected':''}>${i} WPM</option>`);</script>
                    </select>
                </div>
            </div>
            <div class="test-config-area">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                    <div><label style="font-size:12px; font-weight:bold; color:#64748b;">TARGET WORDS</label><select id="wordCountSelect" class="modern-select" onchange="updateAutoStop()"></select></div>
                    <div><label style="font-size:12px; font-weight:bold; color:#64748b;">TIMER</label><select id="timer-select" class="modern-select"><option value="50">50 Min</option><option value="40">40 Min</option><option value="10">10 Min</option></select></div>
                </div>
                <div style="text-align:center; margin-top:15px;"><label><input type="checkbox" id="includeComma"> Count comma (,) mistakes</label></div>
                <button id="startTranscriptionBtn" onclick="showInstructions()" style="width:100%; padding:15px; background:#1e293b; color:white; border-radius:12px; font-weight:bold; margin-top:15px;">🚀 Start Transcription Test</button>
            </div>
        </div>
        <button onclick="goHome()" style="background:none; width:100%; margin-top:20px; color:#94a3b8;">Choose a different dictation</button>
    </div>

    <!-- RESULTS VIEW -->
    <div id="results-view" class="view">
        <div id="resultSheetContainer"></div>
        <div style="text-align:center; padding:30px;">
            <button onclick="window.print()" style="padding:12px 25px; background:#374151; color:white; border-radius:8px; margin-right:10px;">Download Report</button>
            <button onclick="goHome()" style="padding:12px 25px; background:#0891b2; color:white; border-radius:8px;">🏠 Try Another</button>
        </div>
    </div>
</div>

<!-- EXAM INTERFACE -->
<div id="exam-view">
    <header class="ssc-header">
        <div><b>STAFF SELECTION COMMISSION</b> - Progressive Magazine</div>
        <div id="typingTimerDisplay" style="color:red; font-size:24px; font-weight:bold;">50:00</div>
    </header>
    <main style="display:flex; flex:1;">
        <div style="flex:1; padding:20px; display:flex; flex-direction:column;">
            <textarea id="typingBox" placeholder="Start typing here..."></textarea>
            <button onclick="submitTranscription()" style="width:120px; background:#000; color:#fff; padding:10px; margin-top:10px;">SUBMIT</button>
        </div>
        <div style="width:280px; background:#f0f0f0; border-left:1px solid #ccc; padding:20px;">
            <div style="width:100px; height:120px; background:#fff; border:1px solid #000; margin:0 auto 15px auto;">PHOTO</div>
            <div><b>Name:</b> <span id="candidate-name-display">USER</span></div>
            <div><b>Test:</b> Progressive</div>
        </div>
    </main>
</div>

<!-- TRANSCRIPT MODAL -->
<div id="transcriptModal" class="modal-overlay">
    <div class="modal-content" style="max-width:750px;">
        <h2>Passage Transcript</h2>
        <div id="transcriptTextBody" style="text-align:left; max-height:400px; overflow-y:auto; padding:15px; background:#f9fafb; border:1px solid #ddd; line-height:1.8; margin-bottom:15px;"></div>
        <button onclick="document.getElementById('transcriptModal').classList.remove('visible')" style="padding:10px 20px; background:#64748b; color:white; border-radius:8px;">Close</button>
    </div>
</div>

<script>
// --- Firebase Config (Matching your index.html) ---
const firebaseConfig = {
  apiKey: "AIzaSyDPkUWIrsibI-hzKJ8ljhvawdJ9Nq4-cpE",
  authDomain: "checkmysteno.firebaseapp.com",
  projectId: "checkmysteno",
  storageBucket: "checkmysteno.firebasestorage.app",
  messagingSenderId: "719325115943",
  appId: "1:719325115943:web:0dd50a67978816d42a8002"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// --- Globals ---
let player, allPassages = [], originalText = "", wordCount = 0;
let candidateId, timer, timeLeft, timerStarted = false;
let currentDocId = null, analysisWorker = new Worker('worker.js');
let g_synonymData = [], g_autoStopTimestamp = Infinity;

// --- AUTH OBSERVER (Prevents "Missing Permission" Error) ---
auth.onAuthStateChanged(async (user) => {
    const loader = document.getElementById('fullPageLoader');
    if (user) {
        candidateId = user.uid;
        document.getElementById('candidate-name-display').textContent = (user.displayName || "USER").toUpperCase();
        
        // Optional Synonyms
        try { 
            const res = await fetch('/config/flex_synonyms.php'); 
            if(res.ok) g_synonymData = await res.json();
        } catch(e) { console.warn("Synonyms skipped."); }

        await fetchPassages();
        setupFilters();
        showView('selection-view');
        loader.style.display = 'none';
    } else {
        const walletUser = DigiWallet.getUser();
        if(!walletUser) {
            alert("Session expired. Please login again.");
            window.parent.location.href = "index.html";
        }
    }
});

// --- Systematic Database Fetching based on Rules ---
async function fetchPassages() {
    try {
        // According to your rules, progressive_index is the list
        const snap = await db.collection("progressive_index").get();
        allPassages = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderGrid();
    } catch(e) { 
        console.error(e);
        document.getElementById('passage-grid').innerHTML = `<p style="color:red; text-align:center; padding:20px;">Access Error: Check if you are Logged In.</p>`; 
    }
}

function renderGrid() {
    const grid = document.getElementById('passage-grid');
    const search = document.getElementById('passageSearch').value.toLowerCase();
    const year = document.getElementById('yearFilter').value;
    const month = document.getElementById('monthFilter').value;
    const progress = JSON.parse(localStorage.getItem(`progProgress_${candidateId}`) || '{}');
    
    grid.innerHTML = '';
    allPassages.filter(p => {
        const mSearch = p.title?.toLowerCase().includes(search) || p.month?.toLowerCase().includes(search);
        const mYear = year === "" || p.year == year;
        const mMonth = month === "" || p.month == month;
        return mSearch && mYear && mMonth;
    }).forEach(p => {
        const attempt = progress[p.id];
        const card = document.createElement('div');
        card.className = 'passage-card';
        card.innerHTML = `
            <div>
                <span class="card-id-badge">${p.month || ''} ${p.year || ''}</span>
                <h3 style="margin:5px 0;">${p.title}</h3>
                <span class="status-badge ${attempt ? 'attempted' : ''}">${attempt ? `Accuracy: ${attempt.accuracy}%` : 'New'}</span>
            </div>
            <button class="take-test-btn" onclick="loadPassage('${p.id}')">Start Transcription</button>
        `;
        grid.appendChild(card);
    });
}

async function loadPassage(id) {
    document.getElementById('fullPageLoader').style.display = 'flex';
    try {
        // According to your rules, actual content is in progressive_passages
        const doc = await db.collection("progressive_passages").doc(id).get();
        const data = doc.data();
        originalText = data.text;
        wordCount = data.wordCount || originalText.split(/\s+/).length;
        currentDocId = id;

        document.getElementById('player-subtitle').textContent = data.title;
        document.getElementById('transcriptTextBody').innerText = originalText;
        
        setupWordOptions();
        showView('player-view');
        initYT(data.audioUrl);
    } catch(e) { alert("Error loading passage content."); }
    finally { document.getElementById('fullPageLoader').style.display = 'none'; }
}

function setupWordOptions() {
    const sel = document.getElementById('wordCountSelect'); sel.innerHTML = '';
    for(let i=200; i<wordCount; i+=200) sel.add(new Option(`${i} Words`, i));
    sel.add(new Option(`Full (${wordCount})`, "full", true, true));
}

function initYT(url) {
    const id = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
    if(player) player.loadVideoById(id);
    else {
        player = new YT.Player('player', { height:'1', width:'1', videoId:id, 
            events: { onReady: (e) => {
                document.getElementById('player-loader').style.display = 'none';
                document.getElementById('total-time').innerText = formatTime(e.target.getDuration());
            }, onStateChange: (e) => {
                if(e.data === 1) {
                    document.getElementById('playBtn').style.display = 'none';
                    document.getElementById('pauseBtn').style.display = 'flex';
                    setInterval(() => {
                        const cur = player.getCurrentTime();
                        document.getElementById('progress-fill').style.width = (cur/player.getDuration())*100+"%";
                        document.getElementById('current-time').innerText = formatTime(cur);
                        if(cur >= g_autoStopTimestamp) player.pauseVideo();
                    }, 500);
                } else {
                    document.getElementById('playBtn').style.display = 'flex';
                    document.getElementById('pauseBtn').style.display = 'none';
                }
            } }
        });
    }
}

function updateAutoStop() {
    const val = document.getElementById('wordCountSelect').value;
    g_autoStopTimestamp = (val === "full") ? Infinity : (player.getDuration() * (parseInt(val)/wordCount)) + 5;
}

function togglePlay() { player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo(); }
function seekRelative(s) { player.seekTo(player.getCurrentTime() + s, true); }
function setPlaybackSpeed() {
    const target = parseInt(document.getElementById('wpmRange').value);
    const native = wordCount / (player.getDuration()/60);
    player.setPlaybackRate(target / native);
}

function showInstructions() { player.pauseVideo(); document.getElementById('instructions-modal').classList.add('visible'); }

function startTranscriptionTest() {
    document.getElementById('instructions-modal').classList.remove('visible');
    showView('exam-view');
    timeLeft = parseInt(document.getElementById('timer-select').value) * 60;
    timerStarted = false;
    document.getElementById('typingBox').value = '';
    document.getElementById('typingBox').focus();
    document.getElementById('typingBox').onkeydown = () => {
        if(!timerStarted) {
            timerStarted = true;
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('typingTimerDisplay').innerText = formatTime(timeLeft);
                if(timeLeft <= 0) submitTranscription();
            }, 1000);
        }
    };
}

function submitTranscription() {
    clearInterval(timer);
    const typed = document.getElementById('typingBox').value;
    document.getElementById('fullPageLoader').style.display = 'flex';
    
    let cropText = originalText;
    const target = document.getElementById('wordCountSelect').value;
    if(target !== "full") cropText = originalText.split(/\s+/).slice(0, parseInt(target)).join(" ");

    analysisWorker.postMessage({
        originalText: cropText, userText: typed,
        config: { mode:'exam', addition:1, omission:1, spelling:0.5, capitalization:0.5, 
                  punctuation: { mode: document.getElementById('includeComma').checked ? 'all' : 'fullstop-only', weight:0.5 } },
        synonymData: g_synonymData
    });

    analysisWorker.onmessage = (e) => {
        const res = e.data;
        const progress = JSON.parse(localStorage.getItem(`progProgress_${candidateId}`) || '{}');
        if(!progress[currentDocId] || res.accuracy > progress[currentDocId].accuracy) {
            progress[currentDocId] = { accuracy: res.accuracy.toFixed(2) };
            localStorage.setItem(`progProgress_${candidateId}`, JSON.stringify(progress));
        }
        renderResults(res);
        showView('results-view');
        document.getElementById('fullPageLoader').style.display = 'none';
    };
}

function renderResults(res) {
    const container = document.getElementById('resultSheetContainer');
    container.innerHTML = `
        <div class="result-sheet-container">
            <h1>Transcription Report</h1>
            <div class="stat-pill">Accuracy: ${res.accuracy.toFixed(2)}%</div>
            <div class="stat-pill" style="background:#ef4444;">Mistakes: ${res.percentageDiff.toFixed(2)}%</div>
            <div class="columns view-side-by-side">
                <div class="col"><strong>Your Transcription:</strong><div>${res.resultHTML}</div></div>
                <div class="col"><strong>Original Text:</strong><div>${res.originalWords.join(" ")}</div></div>
            </div>
        </div>
    `;
}

// --- Systematic Utils ---
function formatTime(s) { if(!s || isNaN(s)) return "00:00"; const m=Math.floor(s/60), sec=Math.floor(s%60); return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`; }
function showView(id) { 
    document.querySelectorAll('.view').forEach(v => v.style.display='none'); 
    document.getElementById('exam-view').style.display='none';
    const el = document.getElementById(id);
    if(id==='exam-view') el.style.display='flex'; else el.style.display='block';
}
function goHome() { location.reload(); }
function openTranscriptModal() { document.getElementById('transcriptModal').classList.add('visible'); }
function setupFilters() {
    const f = () => renderGrid();
    document.getElementById('passageSearch').oninput = f;
    document.getElementById('yearFilter').onchange = f;
    document.getElementById('monthFilter').onchange = f;
    document.getElementById('resetProgressBtn').onclick = () => { if(confirm("Reset History?")) { localStorage.removeItem(`progProgress_${candidateId}`); renderGrid(); } };
}
</script>
</body>
</html>
